<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Messages for {{ name }} - Happy Birthday {{ name }}">
    <meta name="author" content="Birthday Surprise">
    <title>Little Things - Happy Birthday {{ name }}! 🎂</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Dancing+Script:wght@400;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <div id="hearts-container"></div>

    <nav class="navbar navbar-expand-lg navbar-dark fixed-top glass-nav">
        <div class="container">
            <a class="navbar-brand" href="{{ url_for('index') }}">
                <span class="brand-icon">🎂</span> {{ name }}'s Day
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('index') }}">
                            <i class="bi bi-house-heart-fill me-1"></i>Back to Home
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <section class="messages-page-hero">
        <div class="container text-center">
            <h1 class="messages-page-title" data-aos="fade-up">
                A Little <span class="text-gradient">Something</span>
            </h1>
            <p class="messages-page-subtitle" data-aos="fade-up" data-aos-delay="200">
                A mix of silly and heartfelt, just for you
            </p>
        </div>
    </section>

    <section class="section messages-full-section">
        <div class="container">
            <div class="messages-grid messages-grid-full">
                {% for msg in messages %}
                <div class="message-item message-item-full glass-card" data-aos="zoom-in" data-aos-delay="{{ loop.index0 * 100 }}">
                    <div class="message-item-emoji">{{ msg.emoji }}</div>
                    <span class="message-item-badge {{ msg.type }}">{{ msg.type }}</span>
                    <span class="message-item-icon">{{ msg.icon }}</span>
                    <h3>{{ msg.title }}</h3>
                    <p>{{ msg.description }}</p>
                </div>
                {% endfor %}
            </div>
        </div>
    </section>

    <div class="text-center mb-5">
        <a href="{{ url_for('index') }}" class="btn btn-primary btn-lg">
            <i class="bi bi-heart-fill me-2"></i>Back to Home
        </a>
    </div>

    <footer class="footer glass-footer">
        <div class="container text-center">
            <p class="footer-text">
                Made with <span class="footer-heart">❤️</span> especially for you, {{ name }}
            </p>
            <p class="footer-year">2026</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1"></script>
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
